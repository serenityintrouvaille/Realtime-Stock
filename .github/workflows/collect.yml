name: 📰 Daily News Collection

on:
  schedule:
    - cron: '0 21 * * *'  # 한국시간 오전 6시 (UTC 21:00)
  workflow_dispatch:      # 수동 실행

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser google-generativeai requests

      - name: Run news collection
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python api/collect.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Auto: Daily news update $(date +%Y-%m-%d)" || echo "No changes"
          git push origin main
