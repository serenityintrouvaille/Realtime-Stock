name: Update Data Every Hour

on:
  schedule:
    # 매시간 정각에 실행
    - cron: '0 * * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser yfinance google-generativeai

      - name: Run update script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cd backend/scripts
          python update_data.py

      - name: Commit and push changes
        run: |
          git config user.name "GeopoliticStock Bot"
          git config user.email "bot@geopoliticstock.com"
          git add backend/data/
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Auto-update data at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push

      - name: Notify status
        if: always()
        run: |
          echo "✅ Data update completed at $(date)"
